name: Build ProximityDisabler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos dependencies
        run: |
          brew install ldid xz
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos

      - name: Set up Theos
        run: |
          echo "export THEOS=/opt/theos" >> $GITHUB_ENV
          echo "export PATH=\$THEOS/bin:\$PATH" >> $GITHUB_ENV

      - name: Build the tweak
        run: |
          make clean
          make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProximityDisabler-Deb
          path: packages/*.deb
