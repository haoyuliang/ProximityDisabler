name: Build ProximityDisabler

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install ldid dpkg make perl

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz \
            -o sdk.tar.xz
          tar -xf sdk.tar.xz -C $HOME/theos/sdks

      - name: Build Package
        env:
          THEOS: ${{ github.workspace }}/../theos
        run: |
          export THEOS=$HOME/theos
          make clean package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ProximityDisabler
          path: packages/*.deb
